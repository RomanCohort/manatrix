<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Guesser - AI 密码猜测系统</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Professional CSS -->
    <link rel="stylesheet" href="/static/css/professional.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- App Shell -->
    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        <span class="logo-title">PG</span>
                        <span class="logo-subtitle">密码猜测</span>
                    </div>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item active">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
                    <span class="nav-text">密码生成</span>
                </a>
                <a href="/pentest" class="nav-item">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></span>
                    <span class="nav-text">渗透测试</span>
                </a>
                <a href="/attack-demo" class="nav-item">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></span>
                    <span class="nav-text">攻击演示</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="theme-toggle" id="themeToggle" title="切换主题">
                    <span class="theme-icon" id="themeIcon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <button class="sidebar-toggle" id="sidebarToggle">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <div class="header-title">
                        <h1>密码生成器</h1>
                        <span class="header-subtitle">AI-Powered Password Generation</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="status-badge" id="status">
                        <span class="status-dot"></span>
                        <span class="status-text">检查中...</span>
                    </div>
                    <div class="header-actions">
                        <button class="btn btn-ghost" id="shortcutsBtn" title="键盘快捷键 (Ctrl+/)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="2" y="4" width="20" height="16" rx="2"/>
                                <path d="M6 8h.01M10 8h.01M14 8h.01M18 8h.01M8 12h.01M12 12h.01M16 12h.01M6 16h8"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </header>

            <!-- Main Content Area -->
            <main class="main-content">
                <div class="content-grid">
                    <!-- Left Panel: Input -->
                    <div class="panel input-panel">
                        <!-- LLM Configuration -->
                        <section class="section collapsible" id="llmSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v10M1 12h6m6 0h10"/></svg>
                                    LLM 配置
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div class="form-group">
                                    <label for="apiKey">API Key</label>
                                    <input type="password" id="apiKey" placeholder="sk-..." class="input">
                                </div>
                                <div class="form-group">
                                    <label for="apiBase">API Base URL</label>
                                    <input type="text" id="apiBase" value="https://api.deepseek.com/v1" class="input">
                                </div>
                                <button id="configureLLM" class="btn btn-secondary">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                                    配置 LLM
                                </button>
                            </div>
                        </section>

                        <!-- Target Information -->
                        <section class="section collapsible" id="targetSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <span class="section-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
                                    目标信息
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div class="form-group">
                                    <label for="targetInfo">输入目标个人信息</label>
                                    <textarea id="targetInfo" class="textarea" rows="6"
                                        placeholder="输入目标的个人信息，如姓名、生日、电话、兴趣爱好、宠物名字等..."></textarea>
                                </div>
                                <div class="checkbox-group">
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="useLLM" checked>
                                        <span class="checkbox-text">使用 LLM 提取</span>
                                    </label>
                                    <label class="checkbox-label">
                                        <input type="checkbox" id="parallelExtract">
                                        <span class="checkbox-text">并行提取</span>
                                    </label>
                                </div>
                                <div class="form-group">
                                    <label for="extractStages">提取阶段</label>
                                    <select id="extractStages" class="select">
                                        <option value="1">1 - 快速提取</option>
                                        <option value="2">2 - 验证</option>
                                        <option value="3" selected>3 - 深度挖掘</option>
                                    </select>
                                </div>
                            </div>
                        </section>

                        <!-- Generation Configuration -->
                        <section class="section collapsible" id="genSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <span class="section-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></span>
                                    生成配置
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div class="form-group">
                                    <label for="genMethod">生成方法</label>
                                    <select id="genMethod" class="select">
                                        <option value="sampling">采样 (Sampling)</option>
                                        <option value="beam">Beam Search</option>
                                        <option value="diverse_beam">Diverse Beam</option>
                                        <option value="typical">Typical Sampling</option>
                                        <option value="contrastive">Contrastive Search</option>
                                    </select>
                                    <div class="method-desc" id="methodDesc"></div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="nSamples">生成数量</label>
                                        <input type="number" id="nSamples" value="20" min="1" max="100" class="input">
                                    </div>
                                    <div class="form-group">
                                        <label for="temperature">温度</label>
                                        <input type="number" id="temperature" value="1.0" min="0.1" max="2.0" step="0.1" class="input">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="topK">Top-K</label>
                                        <input type="number" id="topK" value="0" min="0" max="100" class="input">
                                    </div>
                                    <div class="form-group">
                                        <label for="topP">Top-P</label>
                                        <input type="number" id="topP" value="0.9" min="0" max="1" step="0.05" class="input">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="tempSchedule">温度调度</label>
                                    <select id="tempSchedule" class="select">
                                        <option value="constant">固定</option>
                                        <option value="linear_decay">线性衰减</option>
                                        <option value="linear_increase">线性增加</option>
                                        <option value="cosine">余弦</option>
                                    </select>
                                </div>
                            </div>
                        </section>

                        <!-- Generate Button -->
                        <button id="generateBtn" class="btn btn-primary btn-large generate-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                            生成密码
                        </button>
                    </div>

                    <!-- Right Panel: Output -->
                    <div class="panel output-panel">
                        <!-- Extracted Features -->
                        <section class="section collapsible" id="featuresSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <span class="section-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
                                    提取的特征
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div id="extractedFeatures" class="features-grid">
                                    <div class="empty-state">
                                        <span class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg></span>
                                        <p class="empty-text">配置 LLM 并输入目标信息后，点击"生成密码"开始提取</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Generated Passwords -->
                        <section class="section collapsible expanded" id="passwordsSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <span class="section-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
                                    生成的密码
                                    <span id="passwordCount" class="badge"></span>
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div id="passwordResults" class="password-grid">
                                    <div class="empty-state">
                                        <span class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
                                        <p class="empty-text">点击"生成密码"开始生成</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Statistics -->
                        <section class="section collapsible" id="statsSection">
                            <button class="section-header" type="button">
                                <h2 class="section-title">
                                    <span class="section-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/><line x1="9.5" y1="10.5" x2="5.5" y2="7.5"/><line x1="14.5" y1="10.5" x2="18.5" y2="7.5"/><line x1="9.5" y1="13.5" x2="5.5" y2="16.5"/><line x1="14.5" y1="13.5" x2="18.5" y2="16.5"/></svg></span>
                                    统计信息
                                </h2>
                                <span class="collapse-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="6 9 12 15 18 9"/>
                                    </svg>
                                </span>
                            </button>
                            <div class="section-content">
                                <div class="stats-grid">
                                    <div class="stat-card">
                                        <span class="stat-label">提取时间</span>
                                        <span id="extractTime" class="stat-value">-</span>
                                    </div>
                                    <div class="stat-card">
                                        <span class="stat-label">生成时间</span>
                                        <span id="genTime" class="stat-value">-</span>
                                    </div>
                                    <div class="stat-card">
                                        <span class="stat-label">缓存命中率</span>
                                        <span id="cacheHitRate" class="stat-value">-</span>
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p id="loadingText">处理中...</p>
        </div>
    </div>

    <!-- Keyboard Shortcuts Modal -->
    <div id="shortcutsModal" class="modal-backdrop">
        <div class="modal modal-md">
            <div class="modal-header">
                <h3 class="modal-title">
                    <span class="modal-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
                    键盘快捷键
                </h3>
                <button class="modal-close" id="closeShortcuts">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="shortcuts-list">
                    <div class="shortcut-item">
                        <kbd>Ctrl</kbd> + <kbd>K</kbd>
                        <span class="shortcut-desc">全局搜索</span>
                    </div>
                    <div class="shortcut-item">
                        <kbd>Ctrl</kbd> + <kbd>/</kbd>
                        <span class="shortcut-desc">显示/隐藏此面板</span>
                    </div>
                    <div class="shortcut-item">
                        <kbd>Ctrl</kbd> + <kbd>Enter</kbd>
                        <span class="shortcut-desc">生成密码</span>
                    </div>
                    <div class="shortcut-item">
                        <kbd>Ctrl</kbd> + <kbd>B</kbd>
                        <span class="shortcut-desc">切换侧边栏</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container (managed by UI components) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- UI Components -->
    <script src="/static/js/components/ui.js"></script>
    <!-- Main App -->
    <script src="/static/js/app.js"></script>
</body>
</html>
